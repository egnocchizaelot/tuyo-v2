<div class='modal-header'>
  <button type="button" class="close" ng-click='this.$close()'>×</button>
  <h4>Agregar Direccion</h4>
</div>
<div class="container" style="margin-top:15px">
  <form name="NewAddressForm" ng-submit="createAddress(addressFormData)">
    <div class="control-group">
      <div class="controls">
          <div class="row">
            <div class="col-xs-12 col-sm-12 col-md-12 col-lg=12">
              <div class="form-group">
                <input ng-model="addressFormData.street" id="newaddress_street" name="newaddress_street" type="text" class="form-control" placeholder="Calle" required />
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-xs-6 col-sm-6 col-md-6 col-lg=6">
              <div class="form-group">
                <input ng-model="addressFormData.number" name="newaddress_number" type="text" class="form-control" placeholder="Numero" required />
              </div>
            </div>
            <div class="col-xs-6 col-sm-6 col-md-6 col-lg=6">
              <div class="form-group">
                <input ng-model="addressFormData.appartment_number" name="newaddress_appartment_number" type="text" class="form-control" placeholder="Numero Apto."/>
              </div>
            </div>
          </div>
          <div class="row">
           <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
              <div class="form-group">
                <input ng-model="addressFormData.corner" id="newaddress_corner" name="newaddress_corner" type="text" class="form-control" placeholder="Esquina" required />
              </div>
            </div> 
          </div>
          <div class="row">
           <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
              <div class="form-group">
                <input ng-model="addressFormData.city" id="newaddress_city" name="newaddress_city" type="text" class="form-control" placeholder="Ciudad" required />
              </div>
            </div> 
          </div>
          <div class="row">
           <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
              <div class="form-group">
                <input ng-model="addressFormData.district" name="newaddress_district" type="text" class="form-control" placeholder="Barrio" required />
              </div>
            </div> 
          </div>
          <div class="row">
           <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
              <div class="form-group">
                <input ng-model="addressFormData.telephone" name="newaddress_telephone" type="text" class="form-control" placeholder="Telefono" onkeypress='return event.charCode >= 48 && event.charCode <= 57' required />
              </div>
            </div> 
          </div>
          <div class="row">
           <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
              <div class="form-group">
                  <label>
                    <input ng-model="addressFormData.principal" name="newaddress_principal" type="checkbox" class="form-control" placeholder="Principal" value="principal" />
                    Principal
                  </label>
              </div>
            </div> 
          </div>
      </div>
      <div class="text-center margin-bottom"><button type="submit" class="btn btn-success">Agregar</button></div>
    </form>
</div>
