<div id="preview">
    <nav class="bg-brand-color modal-navbar">
        <div class="container">
            <a href="" ng-click="close()" class="btn-back modals-visible-mobile" title="Atrás" id="backPreview">
                <i class="fa fa-angle-left" aria-hidden="true"></i>
            </a>
            <h2 class="text-center">Vista previa</h2>

            <button ng-click="close()" type="button" class="close modals-hidden-mobile" title="Salir"><span aria-hidden="true">&times;</span></button>
        </div>
    </nav>

    <donation-post donation="donation" ng-if="donationLoaded"></donation-post>

</div>

<div class="container footer footer-compartir " style="background: #ffffff; padding-bottom: 10px !important">

    <div class="row margin-top">
        <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
            <a class="btn btn-line-green" ng-click="editDonation()" title="Editar"> Editar </a>
        </div>
        <div class="col-xs-8 col-sm-8 col-md-8 col-lg-8 no-padding-left">
            <a class="btn btn-primary display-block" ng-click="donationAction()"> {{buttonText}} </a>
        </div>
    </div>
</div>
