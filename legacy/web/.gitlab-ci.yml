#Stages
stages:
  - build_install

build_dev:
  tags:
    - development
  stage: build_install
  before_script:
  - export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" --no-use #load nvm
  script:
    - echo 'Instalando Dependencias del Proyecto...'
    - nvm install 8
    - nvm use 8
    - npm install
    - npx bower install
    - sudo apt-get install -y ruby-compass
    - npx grunt build --verbose
    - echo 'Build del Proyecto Terminado!!'
    - echo 'Haciendo Deploy en DEV...'
    - sudo rm -rf /var/www/tuyo_tools/www/*
    - sudo cp -r dist/. /var/www/tuyo_tools/www/
    - echo 'Deploy en DEV Terminado!!'
  only:
    - devel
    
build_test:
  tags:
    - test
  stage: build_install
  before_script:
  - export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" --no-use #load nvm
  script:
    - echo 'Instalando Dependencias del Proyecto...'
    - nvm install 8
    - nvm use 8
    - npm install
    - npx bower install
    - sudo apt-get install -y ruby-compass
    - npx grunt build --verbose
    - echo 'Build del Proyecto Terminado!!'
    - echo 'Haciendo Deploy en DEV...'
    - sudo rm -rf /var/www/tuyo_tools/www/*
    - sudo cp -r dist/. /var/www/tuyo_tools/www/
    - echo 'Deploy en DEV Terminado!!'
  only:
    - test

build_prod:
  tags:
    - prod
  stage: build_install
  before_script:
    - pwd
    - sudo apt-get update
    - sudo apt-get -qq -y install wget #install wget
    - wget -qO- https://raw.githubusercontent.com/creationix/nvm/v0.35.3/install.sh | bash #install nvm
    - export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" --no-use #load nvm
    - eval "[ -f .nvmrc ] && nvm install || nvm install 4.2.6" #install node
  script:
    - echo 'Instalando Dependencias del Proyecto...'
    - nvm install 8
    - nvm use 8
    - npm install
    - npx bower install
    - sudo apt-get install -y ruby-compass
    - npx grunt build --verbose
    - echo 'Build del Proyecto Terminado!!'
    - echo 'Haciendo Deploy en DEV...'
    - sudo rm -rf /var/www/tuyo_tools/www/*
    - sudo cp -r dist/. /var/www/tuyo_tools/www/
    - echo 'Deploy en DEV Terminado!!'
  only:
    - master